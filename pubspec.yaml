name: fullstack_flutter_note_app
description: A perfect Flutter note-taking app with Material 3, Riverpod, Hive, swipe gestures, dark mode.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.2.2
  flutter_slidable: ^3.1.1
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
